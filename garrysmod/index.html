      <script> document.addEventListener("DOMContentLoaded", function() { const today = new Date(); // Dark mode logic const isHalloween = (today.getMonth() === 9 && today.getDate() >= 15) || (today.getMonth() === 10 && today.getDate() <= 5); const darkMode = today.getHours() >= 19 || today.getHours() <= 7; const chromeVersionMatch = navigator.userAgent.match(/Chrome\/(\d+)/); const isSupportsSystemDarkMode = chromeVersionMatch ? parseInt(chromeVersionMatch[1], 10) >= 76 : false; const systemDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; if (isHalloween || (isSupportsSystemDarkMode ? systemDarkMode : darkMode)) { document.body.classList.add("dark"); } // Redirect after 10s // Remove the timeout if you don't want auto redirect setTimeout(() => { window.location.href = "/garrysmod/menu"; }, 10000); }); function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang, gamemodeNice) { const mapImg = "img/gmod_logo_brave.png"; document.querySelector("#serverName").innerText = servername; document.querySelector("#serverMap").innerText = mapname; document.querySelector("#serverGamemode").innerText = gamemodeNice; document.querySelector("#mapimg").setAttribute("src", mapImg); document.body.style.backgroundImage = url('${mapImg}'); document.querySelector(".server_info").classList.add("visible"); } function DownloadingFile(file) { /* placeholder */ } function SetStatusChanged(status) { /* placeholder */ } </script>
